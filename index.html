<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beteseb Bingo Official</title>
    <style>
        :root { --bg: #0f0f1e; --card-bg: #1a1a2e; --accent: #e94560; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 5px; text-align: center; overflow-x: hidden; }
        .hidden { display: none !important; }
        .info-bar { display: flex; justify-content: space-around; background: #16213e; padding: 10px 5px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; }
        .info-item { display: flex; flex-direction: column; font-size: 0.75rem; }
        .info-label { color: #888; margin-bottom: 2px; }
        .info-value { color: #ffeb3b; font-weight: bold; font-size: 0.9rem; }
        .stake-box { background: var(--accent); padding: 5px 12px; border-radius: 15px; color: white; font-weight: bold; font-size: 0.8rem; cursor: pointer; }
        .game-stats { display: flex; justify-content: space-between; background: #1a1a2e; padding: 8px; border-radius: 8px; margin-bottom: 10px; border-bottom: 2px solid #333; font-size: 0.75rem; }
        .stat-box { display: flex; flex-direction: column; gap: 2px; }
        .stat-label { color: #aaa; font-size: 0.65rem; text-transform: uppercase; }
        .stat-val { color: #fff; font-weight: bold; }
        .scroll-area { height: 250px; overflow-y: auto; background: var(--card-bg); border-radius: 12px; padding: 10px; margin: 10px; }
        .num-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        .n-btn { padding: 12px 0; border: none; background: #2c3e50; color: white; border-radius: 6px; font-weight: bold; }
        .n-btn.active { background: var(--accent); border: 2px solid #fff; }
        .game-layout { display: flex; gap: 8px; justify-content: center; align-items: start; }
        .board-left { background: #16213e; padding: 5px; border-radius: 8px; width: 150px; }
        .sb-header { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; margin-bottom: 4px; }
        .sb-header div { font-size: 0.8rem; font-weight: bold; color: #ffeb3b; }
        .sb-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .b-cell { font-size: 0.75rem; padding: 4px 0; color: #444; border: 1px solid #222; text-align: center; }
        .b-cell.hit { background: #ffeb3b; color: #000; font-weight: bold; }
        .card-container { background: #fff; padding: 4px; border-radius: 6px; width: 175px; position: relative; }
        .card-header { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; margin-bottom: 2px; }
        .card-header div { color: white; font-weight: bold; padding: 2px 0; border-radius: 2px; font-size: 0.7rem; }
        .grid-mini { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; position: relative; }
        .cell { aspect-ratio: 1; background: #f0f0f0; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 2px; font-size: 0.75rem; border: 1px solid #eee; }
        .cell.marked { background: #ffc107; border: 1px solid #e65100; }
        .cell.free { background: #4caf50; color: white; font-size: 0.4rem; }
        .win-line { position: absolute; background: rgba(233, 69, 96, 0.8); z-index: 100; border-radius: 5px; pointer-events: none; }
        .call-ball { background: white; color: #8e24aa; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: bold; margin: 0 auto 10px; border: 4px solid #ffeb3b; }
        #bingo-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .win-box { background: #1a1a2e; padding: 25px; border-radius: 20px; width: 85%; text-align: center; border: 1px solid #333; }
        .win-prize { color: #ffeb3b; font-size: 1.5rem; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="bingo-overlay" class="hidden">
        <div class="win-box">
            <div style="font-size: 3rem;">🏆</div>
            <h1 style="color: #ffeb3b; margin: 10px 0; font-size: 2.5rem;">BINGO!</h1>
            <div id="winners-list"></div>
            <p id="win-cartela-text" style="color: #4caf50; font-weight: bold; margin-top: 15px; font-size: 1.1rem;"></p>
            <div class="win-prize">Prize: 8.00 ETB</div>
        </div>
    </div>

    <div id="p1">
        <div class="info-bar">
            <div class="info-item"><span class="info-label">Main Wallet</span><span class="info-value" id="main-wallet">0.00</span></div>
            <div class="info-item"><span class="info-label">Play Wallet</span><span class="info-value" id="play-wallet">0.00</span></div>
            <div class="stake-box" onclick="handleStake()">Stake 10</div>
            <div id="timer" style="background:#ffeb3b; color:#000; font-weight:bold; padding:5px 10px; border-radius:8px;">20 s</div>
        </div>
        <h3 style="color:#4caf50; margin: 10px 0;">ካርቴላ ይምረጡ</h3>
        <div class="scroll-area"><div class="num-grid" id="btns-container"></div></div>
    </div>

    <div id="p2" class="hidden">
        <div class="game-stats">
            <div class="stat-box"><span class="stat-label">Players</span><span class="stat-val">1</span></div>
            <div class="stat-box"><span class="stat-label">Bet</span><span class="stat-val">10.00</span></div>
            <div class="stat-box"><span class="stat-label">Derash</span><span class="stat-val">8.00</span></div>
            <div class="stat-box"><span class="stat-label">Called</span><span class="stat-val" id="called-count">0</span></div>
        </div>
        <div class="call-ball" id="ball-display">--</div>
        <div class="game-layout">
            <div class="board-left">
                <div class="sb-header"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
                <div class="sb-grid" id="side-grid"></div>
            </div>
            <div id="main-card-area"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id');
        const initialBalance = parseFloat(urlParams.get('balance') || "0");
        const apiKey = "AjrN4gl9HapjUyFMi5o7PE238LJzwzrNeryBOBdd";
        const botId = "1383794";

        document.getElementById('main-wallet').innerText = initialBalance.toFixed(2);

        function updateBalance(amount) {
            if(!userId) return;
            fetch(`https://api.bot-business.com/v1/bots/${botId}/users/${userId}/resources/balance/add?amount=${amount}&api_key=${apiKey}`, {method:'POST'});
            let cur = parseFloat(document.getElementById('main-wallet').innerText);
            document.getElementById('main-wallet').innerText = (cur + amount).toFixed(2);
        }

        function handleStake() {
            let cur = parseFloat(document.getElementById('main-wallet').innerText);
            if(cur >= 10) {
                updateBalance(-10);
                document.getElementById('play-wallet').innerText = "10.00";
            } else { alert("በቂ ባላንስ የለዎትም!"); }
        }

        let chosenId = null;
        let calledNums = [];
        let myCardData = [];
        const letters = ['B', 'I', 'N', 'G', 'O'];
        const colors = ['#1e88e5', '#8e24aa', '#d81b60', '#43a047', '#fb8c00'];

        function getCardData(id) {
            let card = [];
            for (let c = 0; c < 5; c++) {
                let pool = Array.from({length: 15}, (_, i) => (c * 15) + 1 + i);
                let seed = id + (c * 137);
                pool.sort(() => { seed = (seed * 9301 + 49297) % 233280; return (seed / 233280) - 0.5; });
                card.push(pool.slice(0, 5));
            }
            return card;
        }

        function createCardHTML(id, isGame) {
            const data = getCardData(id);
            if(isGame) myCardData = data;
            let h = `<div class="card-container"><div class="card-header">`;
            letters.forEach((l, i) => h += `<div style="background:${colors[i]}">${l}</div>`);
            h += `</div><div class="grid-mini" id="${isGame?'game-grid':''}">`;
            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    let v = data[c][r];
                    if(r==2 && c==2) h += `<div class="cell free">FREE</div>`;
                    else h += `<div class="cell" id="${isGame?'c-'+v:''}">${v}</div>`;
                }
            }
            return h + `</div></div>`;
        }

        const btnBox = document.getElementById('btns-container');
        for(let i=1; i<=100; i++) {
            let b = document.createElement('button'); b.className='n-btn'; b.innerText=i;
            b.onclick = () => {
                document.querySelectorAll('.n-btn').forEach(x=>x.classList.remove('active'));
                b.classList.add('active'); chosenId = i;
            };
            btnBox.appendChild(b);
        }

        let sec = 20;
        let t = setInterval(() => {
            sec--; document.getElementById('timer').innerText = sec + " s";
            if(sec <= 0) { clearInterval(t); if(chosenId) startGame(); else location.reload(); }
        }, 1000);

        function startGame() {
            document.getElementById('p1').classList.add('hidden');
            document.getElementById('p2').classList.remove('hidden');
            const sg = document.getElementById('side-grid');
            for(let i=1; i<=75; i++) {
                let d = document.createElement('div'); d.className='b-cell'; d.id='bc-'+i; d.innerText=i; sg.appendChild(d);
            }
            document.getElementById('main-card-area').innerHTML = createCardHTML(chosenId, true);
            let loop = setInterval(() => {
                let n; do { n = Math.floor(Math.random()*75)+1; } while(calledNums.includes(n));
                calledNums.push(n);
                document.getElementById('called-count').innerText = calledNums.length;
                document.getElementById('ball-display').innerText = letters[Math.floor((n-1)/15)] + "-" + n;
                if(document.getElementById('bc-'+n)) document.getElementById('bc-'+n).classList.add('hit');
                if(document.getElementById('c-'+n)) document.getElementById('c-'+n).classList.add('marked');
                let win = checkWin();
                if(win) { clearInterval(loop); showBingo(win); }
            }, 2500); 
        }

        function checkWin() {
            for(let r=0; r<5; r++) {
                let count=0; for(let c=0; c<5; c++) if(myCardData[c][r]===0 || calledNums.includes(myCardData[c][r])) count++;
                if(count===5) return {type:'h', idx:r};
            }
            for(let c=0; c<5; c++) {
                let count=0; for(let r=0; r<5; r++) if(myCardData[c][r]===0 || calledNums.includes(myCardData[c][r])) count++;
                if(count===5) return {type:'v', idx:c};
            }
            return null;
        }

        function showBingo(win) {
            updateBalance(8);
            const grid = document.getElementById('game-grid');
            const line = document.createElement('div'); line.className='win-line';
            if(win.type==='h') { line.style.width='100%'; line.style.height='4px'; line.style.top=(win.idx*20+10)+'%'; }
            if(win.type==='v') { line.style.width='4px'; line.style.height='100%'; line.style.left=(win.idx*20+10)+'%'; }
            grid.appendChild(line);
            setTimeout(() => {
                document.getElementById('win-cartela-text').innerText = `Winning Cartela: #${chosenId}`;
                document.getElementById('bingo-overlay').classList.remove('hidden');
            }, 500);
        }
    </script>
</body>
</html>
